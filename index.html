<!DOCTYPE html>
<html lang="en">
  
<head>
  <meta charset="UTF-8" />
  <title>RF Basketball – Teams</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="/assets/images/favicon.ico">
</head>
<body>
  <main>
    <header>
      <span class="eyebrow">Spring 2026 · Tuesdays</span>
      <h1>Remnant Fellowship Basketball</h1>
      <p class="subtitle">March 31 – May 26, 2026</p>
    </header>

    <nav>
      <a href="index.html" class="active">Teams</a>
      <a href="rules.html">Rules &amp; Schedule</a>
      <a href="standings.html">Standings</a>
    </nav>

    <div class="teams-grid" id="teams-grid">
      <p style="color:var(--text-muted);text-align:center;padding:2rem;grid-column:1/-1;">Loading teams…</p>
    </div>

    <footer>
      Remnant Fellowship Basketball League &middot; Spring 2026
      <div class="theme-bar" id="theme-bar"></div>
    </footer>
  </main>
<script src="theme.js"></script>
<script>
  const TEAMS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTa_fazSKi7Iz3HCDE1VOgks8wel2sWC1ZLbzTw9crZFTTcaPZ1SkqiWswxX-ZzK0b1Za8xh9okRYq5/pub?output=csv';

  function parseCSV(text) {
    const [headerLine, ...rows] = text.trim().split('\n');
    const headers = headerLine.split(',').map(h => h.trim());
    return rows.map(row => {
      const values = row.split(',').map(v => v.trim());
      return Object.fromEntries(headers.map((h, i) => [h, values[i] ?? '']));
    });
  }

  function groupByTeam(rows) {
    const teams = {};
    rows.forEach(row => {
      const num = row['Team Number'];
      if (!teams[num]) teams[num] = [];
      teams[num].push(row['Player Names']);
    });
    return teams;
  }

  function renderTeams(teams) {
    const params = new URLSearchParams(window.location.search);
    const activeTeam = params.get('team');

    const html = Object.keys(teams)
      .sort((a, b) => Number(a) - Number(b))
      .map(num => `
        <div class="team-card${activeTeam === num ? ' active' : ''}" id="team-${num}">
          <h2>Team ${num}</h2>
          <ul>
            ${teams[num].map(p => `<li>${p}</li>`).join('')}
          </ul>
        </div>`)
      .join('');

    document.getElementById('teams-grid').innerHTML = html;

    if (activeTeam) {
      const el = document.getElementById(`team-${activeTeam}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  async function loadTeams() {
    try {
      const res = await fetch(TEAMS_CSV);
      const text = await res.text();
      renderTeams(groupByTeam(parseCSV(text)));
    } catch {
      document.getElementById('teams-grid').innerHTML =
        '<p style="color:#f87171;text-align:center;grid-column:1/-1;padding:2rem;">Failed to load team data. Please try again.</p>';
    }
  }

  loadTeams();
</script>
</body>
</html>
